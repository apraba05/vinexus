name: Build & Release Desktop IDE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npx prisma generate && npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Package with electron-builder (macOS)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Rename artifact
        working-directory: vm-ide/dist-electron
        run: |
          DMG=$(ls *.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then mv "$DMG" Vinexus-mac.dmg; fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: vm-ide/dist-electron/Vinexus-mac.dmg
          retention-days: 1

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npx prisma generate && npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Package with electron-builder (Windows)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never

      - name: Rename artifact
        working-directory: vm-ide/dist-electron
        shell: bash
        run: |
          EXE=$(ls *.exe 2>/dev/null | head -1)
          if [ -n "$EXE" ]; then mv "$EXE" Vinexus-Setup-win.exe; fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: vm-ide/dist-electron/Vinexus-Setup-win.exe
          retention-days: 1

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libasound2 libxtst6 xvfb rpm fakeroot dpkg

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npx prisma generate && npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Package with electron-builder (Linux)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Rename artifacts
        working-directory: vm-ide/dist-electron
        run: |
          APPIMAGE=$(ls *.AppImage 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then mv "$APPIMAGE" Vinexus-linux.AppImage; fi
          DEB=$(ls *.deb 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then mv "$DEB" Vinexus-linux.deb; fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            vm-ide/dist-electron/Vinexus-linux.AppImage
            vm-ide/dist-electron/Vinexus-linux.deb
          retention-days: 1

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Vinexus ${{ github.ref_name }}
          body: |
            ## Vinexus Desktop IDE ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | macOS    | `Vinexus-mac.dmg` |
            | Windows  | `Vinexus-Setup-win.exe` |
            | Linux    | `Vinexus-linux.AppImage` · `Vinexus-linux.deb` |

            **First time?** Create an account at [vinexus.space](https://vinexus.space) before launching the app.
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
