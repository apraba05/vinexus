name: Build & Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        working-directory: vm-ide/desktop
        run: npm install --ignore-scripts

      - name: Prepare native modules (macOS)
        working-directory: vm-ide/desktop
        run: |
          find node_modules/app-builder-bin -type f ! -name "*.js" ! -name "*.json" ! -name "*.md" ! -name "*.txt" | xargs chmod +x 2>/dev/null || true
          find node_modules/app-builder-bin -type f -exec xattr -d com.apple.quarantine {} \; 2>/dev/null || true

      - name: Build renderer (Vite)
        working-directory: vm-ide/desktop
        run: npx vite build

      - name: Build main process (TypeScript)
        working-directory: vm-ide/desktop
        run: npx tsc -p tsconfig.main.json

      - name: Package with electron-builder (macOS)
        working-directory: vm-ide/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Rename artifacts to stable names
        working-directory: vm-ide/desktop/release
        run: |
          DMG=$(ls *.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then mv "$DMG" Vinexus-mac.dmg; fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: vm-ide/desktop/release/Vinexus-mac.dmg
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        working-directory: vm-ide/desktop
        run: npm install --ignore-scripts

      - name: Build renderer (Vite)
        working-directory: vm-ide/desktop
        run: npx vite build

      - name: Build main process (TypeScript)
        working-directory: vm-ide/desktop
        run: npx tsc -p tsconfig.main.json

      - name: Package with electron-builder (Windows)
        working-directory: vm-ide/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never

      - name: Rename artifacts to stable names
        working-directory: vm-ide/desktop/release
        shell: bash
        run: |
          EXE=$(ls *.exe 2>/dev/null | head -1)
          if [ -n "$EXE" ]; then mv "$EXE" Vinexus-Setup.exe; fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: vm-ide/desktop/release/Vinexus-Setup.exe
          retention-days: 1

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            python3 \
            make \
            g++ \
            fakeroot \
            dpkg

      - name: Install desktop dependencies
        working-directory: vm-ide/desktop
        run: npm install --ignore-scripts

      - name: Prepare native modules (Linux)
        working-directory: vm-ide/desktop
        run: |
          find node_modules/app-builder-bin -type f ! -name "*.js" ! -name "*.json" ! -name "*.md" ! -name "*.txt" | xargs chmod +x 2>/dev/null || true

      - name: Build renderer (Vite)
        working-directory: vm-ide/desktop
        run: npx vite build

      - name: Build main process (TypeScript)
        working-directory: vm-ide/desktop
        run: npx tsc -p tsconfig.main.json

      - name: Package with electron-builder (Linux)
        working-directory: vm-ide/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Rename artifacts to stable names
        working-directory: vm-ide/desktop/release
        run: |
          APPIMAGE=$(ls *.AppImage 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then mv "$APPIMAGE" Vinexus.AppImage; fi
          DEB=$(ls *.deb 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then mv "$DEB" Vinexus.deb; fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            vm-ide/desktop/release/Vinexus.AppImage
            vm-ide/desktop/release/Vinexus.deb
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Vinexus ${{ github.ref_name }}
          body: |
            ## Vinexus ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS | `Vinexus-mac.dmg` |
            | Windows | `Vinexus-Setup.exe` |
            | Linux | `Vinexus.AppImage`, `Vinexus.deb` |

            **macOS install (no Gatekeeper dialogs):**
            ```bash
            /bin/bash -c "$(curl -fsSL https://vinexus.space/install.sh)"
            ```

            Or visit [vinexus.space/download](https://vinexus.space/download) for all install options.
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
