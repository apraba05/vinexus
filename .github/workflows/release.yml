name: Build & Release Desktop IDE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Generate Prisma client (root)
        working-directory: vm-ide
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate

      - name: Generate Prisma client (backend)
        working-directory: vm-ide/backend
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate --schema ../prisma/schema.prisma

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Prepare standalone assets and runtime config
        working-directory: vm-ide
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Static files must live inside the standalone dir so server.js can find them
          cp -r frontend/.next/static frontend/.next/standalone/.next/static
          cp -r frontend/public frontend/.next/standalone/public
          # Write runtime env — read by main.js at app startup
          printf 'DATABASE_URL=%s\nNEXTAUTH_SECRET=%s\nADMIN_EMAIL=%s\nNEXT_PUBLIC_APP_URL=http://localhost:3000\nGITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nANTHROPIC_API_KEY=%s\n' \
            "$DATABASE_URL" "$NEXTAUTH_SECRET" "$ADMIN_EMAIL" \
            "$GH_CLIENT_ID" "$GH_CLIENT_SECRET" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" \
            "$ANTHROPIC_API_KEY" \
            > frontend/.next/standalone/runtime.env
          # Prisma generates to root node_modules/.prisma (based on schema location).
          # Copy the root-generated client into backend/node_modules so it can be found at runtime.
          cp -r node_modules/.prisma backend/node_modules/.prisma
          # electron-builder strips dotfile 'from' paths — use a non-dot-prefixed copy.
          cp -r backend/node_modules/.prisma backend/prisma-runtime

      - name: Remove cpu-features (uses pure-JS fallback)
        working-directory: vm-ide
        run: rm -rf node_modules/cpu-features

      - name: Package with electron-builder (macOS)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            vm-ide/dist-electron/*.dmg
            vm-ide/dist-electron/*-mac.zip
            vm-ide/dist-electron/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Generate Prisma client (root)
        working-directory: vm-ide
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate

      - name: Generate Prisma client (backend)
        working-directory: vm-ide/backend
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate --schema ../prisma/schema.prisma

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Prepare standalone assets and runtime config
        working-directory: vm-ide
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cp -r frontend/.next/static frontend/.next/standalone/.next/static
          cp -r frontend/public frontend/.next/standalone/public
          printf 'DATABASE_URL=%s\nNEXTAUTH_SECRET=%s\nADMIN_EMAIL=%s\nNEXT_PUBLIC_APP_URL=http://localhost:3000\nGITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nANTHROPIC_API_KEY=%s\n' \
            "$DATABASE_URL" "$NEXTAUTH_SECRET" "$ADMIN_EMAIL" \
            "$GH_CLIENT_ID" "$GH_CLIENT_SECRET" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" \
            "$ANTHROPIC_API_KEY" \
            > frontend/.next/standalone/runtime.env
          cp -r node_modules/.prisma backend/node_modules/.prisma
          cp -r backend/node_modules/.prisma backend/prisma-runtime

      - name: Remove cpu-features (uses pure-JS fallback)
        working-directory: vm-ide
        shell: bash
        run: rm -rf node_modules/cpu-features

      - name: Package with electron-builder (Windows)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            vm-ide/dist-electron/Vinexus-Setup-win.exe
            vm-ide/dist-electron/latest.yml
          retention-days: 1

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libasound2 libxtst6 xvfb rpm fakeroot dpkg

      - name: Install root dependencies
        working-directory: vm-ide
        run: npm install --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vm-ide/frontend
        run: npm install --ignore-scripts

      - name: Install backend dependencies
        working-directory: vm-ide/backend
        run: npm install --ignore-scripts

      - name: Generate Prisma client (root)
        working-directory: vm-ide
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate

      - name: Generate Prisma client (backend)
        working-directory: vm-ide/backend
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
        run: npx prisma generate --schema ../prisma/schema.prisma

      - name: Build frontend (Next.js standalone)
        working-directory: vm-ide/frontend
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

      - name: Build backend
        working-directory: vm-ide/backend
        run: npm run build

      - name: Prepare standalone assets and runtime config
        working-directory: vm-ide
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cp -r frontend/.next/static frontend/.next/standalone/.next/static
          cp -r frontend/public frontend/.next/standalone/public
          printf 'DATABASE_URL=%s\nNEXTAUTH_SECRET=%s\nADMIN_EMAIL=%s\nNEXT_PUBLIC_APP_URL=http://localhost:3000\nGITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nANTHROPIC_API_KEY=%s\n' \
            "$DATABASE_URL" "$NEXTAUTH_SECRET" "$ADMIN_EMAIL" \
            "$GH_CLIENT_ID" "$GH_CLIENT_SECRET" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" \
            "$ANTHROPIC_API_KEY" \
            > frontend/.next/standalone/runtime.env
          cp -r node_modules/.prisma backend/node_modules/.prisma
          cp -r backend/node_modules/.prisma backend/prisma-runtime

      - name: Remove cpu-features (uses pure-JS fallback)
        working-directory: vm-ide
        run: rm -rf node_modules/cpu-features

      - name: Package with electron-builder (Linux)
        working-directory: vm-ide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            vm-ide/dist-electron/Vinexus-linux.AppImage
            vm-ide/dist-electron/Vinexus-linux.deb
            vm-ide/dist-electron/latest-linux.yml
          retention-days: 1

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Vinexus ${{ github.ref_name }}
          body: |
            ## Vinexus Desktop IDE ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | macOS    | `Vinexus-mac.dmg` |
            | Windows  | `Vinexus-Setup-win.exe` |
            | Linux    | `Vinexus-linux.AppImage` · `Vinexus-linux.deb` |

            **First time?** Create an account at [vinexus.space](https://vinexus.space) before launching the app.
          files: |
            artifacts/*.dmg
            artifacts/*-mac.zip
            artifacts/Vinexus-Setup-win.exe
            artifacts/Vinexus-linux.AppImage
            artifacts/Vinexus-linux.deb
            artifacts/latest-mac.yml
            artifacts/latest.yml
            artifacts/latest-linux.yml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
