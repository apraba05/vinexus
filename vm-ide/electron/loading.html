<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinexus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 0.2s;
      -webkit-app-region: drag;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: block;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 1;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }
    .spinner {
      margin-top: 32px;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards 0.6s, spin 0.8s linear 0.6s infinite;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="brand" aria-label="Vinexus">
    <img class="logo-icon" src="./assets/icon.png" alt="Vinexus" />
    <div class="logo-text">Vinexus</div>
  </div>
  <div class="spinner"></div>
</body>
</html>
