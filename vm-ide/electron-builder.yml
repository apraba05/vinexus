# electron-builder.yml
#
# Vinexus Desktop — Build Configuration
#
# Produces:
#   - macOS:   dist-electron/Vinexus-x.x.x.dmg + zip (code-signed & notarized)
#   - Windows: dist-electron/Vinexus-Setup-x.x.x.exe (NSIS installer)
#   - Linux:   dist-electron/Vinexus-x.x.x.AppImage + deb

appId: com.vinexus.ide
productName: Vinexus
copyright: "Copyright © 2025 Vinexus"

# ── Build Output ─────────────────────────────────────────────────────────────
directories:
  output: dist-electron
  buildResources: electron/assets

# ── Files to include in the app package ─────────────────────────────────────
files:
  - electron/**/*
  - frontend/.next/standalone/**/*
  - frontend/.next/static/**/*
  - frontend/public/**/*
  - backend/dist/**/*
  - node_modules/**/*
  - package.json

# ── Extra Resources (copied outside the asar archive) ───────────────────────
extraResources:
  - from: frontend/.next/standalone
    to: frontend/.next/standalone
  - from: frontend/.next/static
    to: frontend/.next/static
  - from: frontend/public
    to: frontend/public
  - from: backend/dist
    to: backend/dist

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: electron/assets/icon.icns
  gatekeeperAssess: false
  # hardenedRuntime, entitlements, notarize — only needed with code signing
  # Re-enable when Apple Developer account is set up
  # Deep link protocol handler
  protocols:
    - name: Vinexus
      schemes:
        - vinexus

dmg:
  title: "Vinexus ${version}"
  background: electron/assets/dmg-background.png
  icon: electron/assets/icon.icns
  iconSize: 80
  contents:
    - x: 410
      y: 200
      type: link
      path: /Applications
    - x: 130
      y: 200
      type: file

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: electron/assets/icon.ico
  # Code signing for Windows — set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD in GitHub Secrets
  # or use EV certificate for immediate SmartScreen trust
  protocols:
    - name: Vinexus
      schemes:
        - vinexus

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vinexus
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  installerHeader: electron/assets/installer-header.bmp
  license: LICENSE

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: electron/assets/icon.png
  category: Development
  protocols:
    - name: Vinexus
      schemes:
        - vinexus
  desktop:
    Name: Vinexus
    Comment: Desktop IDE for virtual machine management
    Categories: Development;IDE;

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3

# ── Auto Updater (GitHub Releases) ───────────────────────────────────────────
publish:
  provider: github
  owner: apraba05
  repo: vinexus
  releaseType: release

# ── ASAR Unpacking ───────────────────────────────────────────────────────────
# node-pty native module must be unpacked from asar
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/ssh2/**/*
